<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Password Form Styles */
        .password-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            margin: 0 auto;
        }

        .password-container h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 300;
        }

        .password-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }

        .password-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .password-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .password-btn:hover {
            transform: translateY(-2px);
        }

        .error-message {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 14px;
        }

        /* Viewer Container Styles */
        .viewer-container {
            display: none;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .viewer-header {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .viewer-header h1 {
            color: #333;
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 15px;
        }

        .file-upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .file-upload-area:hover {
            border-color: #764ba2;
            background: #f0f4ff;
        }

        .file-upload-area.dragover {
            border-color: #764ba2;
            background: #e8f0ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .upload-subtext {
            color: #999;
            font-size: 14px;
        }

        .file-input {
            display: none;
        }

        /* Model Selector Styles */
        .model-selector {
            margin-bottom: 20px;
        }

        .model-selector label {
            color: #666;
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
        }

        .model-selector select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            color: #333;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        .model-selector select:focus {
            outline: none;
            border-color: #667eea;
        }

        .divider {
            text-align: center;
            margin: 15px 0;
            color: #999;
            font-size: 14px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        /* Model Viewer Styles */
        .model-viewer-container {
            height: 600px;
            position: relative;
            background: #f0f0f0;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
        }

        .loading-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .controls {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }

        .control-btn:hover {
            background: #5a6fd8;
        }

        .control-btn.active {
            background: #764ba2;
        }

        .model-info {
            color: #666;
            font-size: 14px;
            margin-left: auto;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .password-container {
                padding: 30px 20px;
                margin: 20px;
            }

            .viewer-header {
                padding: 15px;
            }

            .file-upload-area {
                padding: 20px;
            }

            .model-viewer-container {
                height: 400px;
            }

            .controls {
                padding: 15px;
                flex-direction: column;
                align-items: stretch;
            }

            .control-btn {
                width: 100%;
            }

            .model-info {
                margin-left: 0;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Password Protection -->
        <div id="passwordContainer" class="password-container">
            <h1>3D Model Viewer</h1>
            <input type="password" id="passwordInput" class="password-input" placeholder="Enter password">
            <button onclick="checkPassword()" class="password-btn">Access Viewer</button>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <!-- Viewer Interface -->
        <div id="viewerContainer" class="viewer-container">
            <div class="viewer-header">
                <h1>3D Model Viewer</h1>
                
                <!-- Model Selection Dropdown -->
                <div class="model-selector">
                    <label for="preloadedModels">Choose a pre-loaded model:</label>
                    <select id="preloadedModels" onchange="loadPreloadedModel(this.value)">
                        <option value="">-- Select a model --</option>
                        <option value="public/models/Current_Version.glb">Current Version</option>
                    </select>
                </div>
                
                <div class="divider">OR</div>
                
                <div class="file-upload-area" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">Upload your own 3D model</div>
                    <div class="upload-subtext">Supports GLB and GLTF files</div>
                    <input type="file" id="fileInput" class="file-input" accept=".glb,.gltf" onchange="loadModel(this.files[0])">
                </div>
            </div>

            <div class="model-viewer-container">
                <model-viewer id="modelViewer"
                    camera-controls
                    touch-action="pan-y"
                    auto-rotate
                    auto-rotate-delay="3000"
                    rotation-per-second="30deg"
                    environment-image="neutral"
                    shadow-intensity="1"
                    exposure="1">
                    <div class="loading-indicator" slot="poster">
                        <div class="spinner"></div>
                        <div>Loading 3D Model...</div>
                    </div>
                </model-viewer>
            </div>

            <div class="controls">
                <button class="control-btn" onclick="resetCamera()">Reset Camera</button>
                <button class="control-btn" id="autoRotateBtn" onclick="toggleAutoRotate()">Auto Rotate: ON</button>
                <button class="control-btn" onclick="toggleWireframe()">Toggle Wireframe</button>
                <div class="model-info" id="modelInfo">No model loaded</div>
            </div>
        </div>
    </div>

    <script>
        // Password configuration
        const CORRECT_PASSWORD = "viewer123"; // Change this to your desired password

        // Global variables
        let autoRotateEnabled = true;
        let modelViewer;

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            modelViewer = document.getElementById('modelViewer');
            setupDragAndDrop();
            setupKeyboardShortcuts();
        });

        // Password validation
        function checkPassword() {
            const input = document.getElementById('passwordInput');
            const errorDiv = document.getElementById('errorMessage');
            
            if (input.value === CORRECT_PASSWORD) {
                document.getElementById('passwordContainer').style.display = 'none';
                document.getElementById('viewerContainer').style.display = 'block';
                errorDiv.textContent = '';
            } else {
                errorDiv.textContent = 'Incorrect password. Please try again.';
                input.value = '';
            }
        }

        // Allow Enter key for password submission
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // Drag and drop functionality
        function setupDragAndDrop() {
            const uploadArea = document.querySelector('.file-upload-area');

            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    loadModel(files[0]);
                }
            });
        }

        // Load 3D model
        function loadModel(file) {
            if (!file) return;

            // Validate file type
            const validExtensions = ['.glb', '.gltf'];
            const fileExtension = file.name.toLowerCase().substring(file.name.lastIndexOf('.'));
            
            if (!validExtensions.includes(fileExtension)) {
                alert('Please select a valid GLB or GLTF file.');
                return;
            }

            // Create object URL and load model
            const url = URL.createObjectURL(file);
            modelViewer.src = url;

            // Update model info
            const modelInfo = document.getElementById('modelInfo');
            modelInfo.textContent = `Loaded: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;

            // Clear preloaded model selection
            document.getElementById('preloadedModels').value = '';

            // Clean up previous object URL
            modelViewer.addEventListener('load', function cleanup() {
                URL.revokeObjectURL(url);
                modelViewer.removeEventListener('load', cleanup);
            });

            // Handle loading errors
            modelViewer.addEventListener('error', function(e) {
                alert('Error loading model. Please check the file format and try again.');
                console.error('Model loading error:', e);
            });
        }

        // Load pre-loaded model
        function loadPreloadedModel(modelPath) {
            if (!modelPath) {
                // Clear the model if no selection
                modelViewer.src = '';
                document.getElementById('modelInfo').textContent = 'No model loaded';
                return;
            }
            
            modelViewer.src = modelPath;
            
            // Update model info
            const modelInfo = document.getElementById('modelInfo');
            const modelName = modelPath.split('/').pop().replace('.glb', '').replace('.gltf', '');
            const displayName = modelName.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            modelInfo.textContent = `Loaded: ${displayName} (Pre-loaded model)`;
            
            // Clear file input
            document.getElementById('fileInput').value = '';
            
            // Handle loading errors for preloaded models
            modelViewer.addEventListener('error', function(e) {
                alert(`Error loading ${displayName}. The model file may not exist or be corrupted.`);
                console.error('Model loading error:', e);
                document.getElementById('preloadedModels').value = '';
                document.getElementById('modelInfo').textContent = 'No model loaded';
            }, { once: true });
        }

        // Control functions
        function resetCamera() {
            if (modelViewer.src) {
                modelViewer.resetTurntableRotation();
                modelViewer.jumpCameraToGoal();
            }
        }

        function toggleAutoRotate() {
            const btn = document.getElementById('autoRotateBtn');
            autoRotateEnabled = !autoRotateEnabled;
            
            if (autoRotateEnabled) {
                modelViewer.setAttribute('auto-rotate', '');
                btn.textContent = 'Auto Rotate: ON';
                btn.classList.remove('active');
            } else {
                modelViewer.removeAttribute('auto-rotate');
                btn.textContent = 'Auto Rotate: OFF';
                btn.classList.add('active');
            }
        }

        function toggleWireframe() {
            // This is a placeholder - wireframe mode requires more advanced implementation
            // For now, we'll toggle the environment lighting
            const currentEnv = modelViewer.getAttribute('environment-image');
            if (currentEnv === 'neutral') {
                modelViewer.setAttribute('environment-image', 'legacy');
            } else {
                modelViewer.setAttribute('environment-image', 'neutral');
            }
        }

        // Keyboard shortcuts
        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', function(e) {
                // Only work when viewer is visible and model is loaded
                if (document.getElementById('viewerContainer').style.display === 'none' || !modelViewer.src) {
                    return;
                }

                switch(e.key.toLowerCase()) {
                    case 'r':
                        resetCamera();
                        break;
                    case 'a':
                        toggleAutoRotate();
                        break;
                    case 'w':
                        toggleWireframe();
                        break;
                }
            });
        }

        // Handle model viewer events
        document.addEventListener('DOMContentLoaded', function() {
            if (modelViewer) {
                modelViewer.addEventListener('load', function() {
                    console.log('Model loaded successfully');
                });

                modelViewer.addEventListener('error', function(e) {
                    console.error('Error loading model:', e);
                });
            }
        });
    </script>
</body>
</html>
